<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split-Step Trainer</title>
  <style>
    /* ── Variables ───────────────────────────────────────────── */
    :root {
      --bg:      #111;
      --fg:      #e8e8e8;
      --accent:  #aaff00;
      --warn:    #ff5533;
      --muted:   #555;
      --radius:  8px;
    }

    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
      font-size: 16px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────────── */
    #header {
      padding: 10px 16px 6px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }
    #status-text {
      font-size: 0.8rem;
      color: #999;
    }

    /* ── Drill Stage ─────────────────────────────────────────── */
    #stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 280px;
    }

    /* Countdown circle */
    #circle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--circle-d);
      height: var(--circle-d);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 4px solid var(--accent);
      box-sizing: content-box;
      pointer-events: none;
      visibility: hidden;
    }

    /* Foot SVGs */
    .foot {
      position: absolute;
      left: 50%;
      top: 50%;
      height: 20dvh;
      aspect-ratio: 317 / 470;
      overflow: visible;
      color: var(--fg); /* currentColor source for child <use> fill */
    }

    /*
     * Neutral stance (§10.2):
     *   left  center: (−70, +80) from stage center, rotate −8°
     *   right center: (+70, +80) from stage center, rotate  +8°
     * translate(-50%,-50%) re-centers the element on its own origin first.
     */
    #foot-left {
      transform: translate(calc(-50% - 70px), calc(-50% + 80px)) rotate(-8deg);
    }
    #foot-right {
      transform: translate(calc(-50% + 70px), calc(-50% + 80px)) rotate(8deg);
    }

    /* ── Toolbar (always visible) ────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #btn-start {
      background: var(--accent);
      color: #111;
      flex: 1;
    }
    #btn-stop {
      background: var(--warn);
      color: #fff;
      flex: 1;
    }
    #btn-audio {
      background: #333;
      color: var(--fg);
      flex: 1;
    }
    #btn-settings {
      background: #2a2a2a;
      color: var(--fg);
      font-size: 1.25rem;
      padding: 0 14px;
      border: 1px solid #3a3a3a;
      transition: color 0.15s, border-color 0.15s;
    }
    #btn-settings[aria-expanded="true"] {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Validation message */
    #validation-msg {
      font-size: 0.78rem;
      color: var(--warn);
      min-height: 1em;
      padding: 0 2px;
    }

    /* ── Config Panel (collapsible) ───────────────────────────── */
    #config-panel {
      flex-shrink: 0;
      background: #161616;
      border-top: 1px solid #2a2a2a;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, padding 0.28s ease;
      padding: 0 16px;
    }
    #config-panel.open {
      max-height: 480px;
      padding: 16px 16px 20px;
      overflow-y: auto;
    }

    .config-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Timing inputs */
    .inputs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input[type="number"] {
      background: #222;
      color: var(--fg);
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 0.95rem;
      width: 100%;
      min-height: 44px;
    }
    .field input[type="number"]:focus {
      outline: 1px solid var(--accent);
      border-color: var(--accent);
    }

    /* Movement checklist */
    .movements-label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .movements-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .movement-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #222;
      border: 1px solid #333;
      border-radius: var(--radius);
      padding: 8px 12px;
      min-height: 44px;
      cursor: pointer;
      font-size: 0.9rem;
      user-select: none;
    }
    .movement-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .movement-item:has(input:checked) {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .foot { transition-duration: 30ms !important; }
      #circle { transition-duration: 30ms !important; }
    }
  </style>
</head>

</main>

<!-- ── Toolbar (always visible) ───────────────────────────────── -->
<div id="toolbar">
  <div class="btn-row">
    <button id="btn-start" disabled aria-describedby="validation-msg">Start Drill</button>
    <button id="btn-stop">Stop</button>
    <button id="btn-audio">Load Audio</button>
    <button id="btn-settings" aria-expanded="false" aria-controls="config-panel"
            title="Settings">⚙</button>
  </div>
  <div id="validation-msg" role="alert" aria-live="polite">
    Select at least one movement.
  </div>
</div>

<!-- ── Config Panel (collapsible) ────────────────────────────── -->
<div id="config-panel" aria-label="Drill settings">
  <div class="config-section">

    <!-- Timing inputs -->
    <div class="inputs-grid">
      <div class="field">
        <label for="input-min-wait">Min Wait (s)</label>
        <input type="number" id="input-min-wait" value="5.0" min="0.5" max="60" step="0.5">
      </div>
      <div class="field">
        <label for="input-max-wait">Max Wait (s)</label>
        <input type="number" id="input-max-wait" value="10.0" min="0.5" max="60" step="0.5">
      </div>
      <div class="field">
        <label for="input-shrink">Shrink Duration (s)</label>
        <input type="number" id="input-shrink" value="2.0" min="0.2" max="10" step="0.1">
      </div>
      <div class="field">
        <label for="input-presplit">Pre-Split Buffer (s)</label>
        <input type="number" id="input-presplit" value="0.15" min="0" max="10" step="0.05">
      </div>
    </div>

    <!-- Movement checklist -->
    <div>
      <div class="movements-label">Reaction Movements</div>
      <div class="movements-list" role="group" aria-label="Reaction movements">
        <label class="movement-item">
          <input type="checkbox" name="movement" value="A" id="move-a">
          A — Volley
        </label>
        <label class="movement-item">
          <input type="checkbox" name="movement" value="B" id="move-b">
          B — Deep Drive Right
        </label>
        <label class="movement-item">
          <input type="checkbox" name="movement" value="C" id="move-c">
          C — Deep Drive Left
        </label>
        <label class="movement-item">
          <input type="checkbox" name="movement" value="D" id="move-d">
          D — Unit Turn Left
        </label>
        <label class="movement-item">
          <input type="checkbox" name="movement" value="E" id="move-e">
          E — Unit Turn Right
        </label>
      </div>
    </div>

  </div>
</div>

<script>
  // ── 1. Constants ────────────────────────────────────────────────────────────

  const REACTION_DELAY_S = 0.10;
  const RESET_DELAY_S    = 1.50;
  const SPLIT_MS         = 120;
  const RESET_MS         = 400;

  // Neutral stance: foot center positions (px from stage center) and rotation (deg)
  const NEUTRAL = {
    left:  { x: -70, y: 80, r: -8 },
    right: { x:  70, y: 80, r:  8 },
  };

  // Wide split-step stance (§10.3)
  const SPLIT = {
    left:  { x: -105, y: 88, r: -8 },
    right: { x:  105, y: 88, r:  8 },
  };

  // Reaction movements: absolute foot positions from neutral (§10.4)
  const MOVEMENTS = {
    A: { label: 'Volley',
         left:  { x:  -80, y:  20, r:  -8 },
         right: { x:   80, y:  20, r:   8 }, ms: 220 },
    B: { label: 'Deep Drive Right',
         left:  { x:  -60, y:  60, r:   0 },
         right: { x:  125, y:  15, r:  18 }, ms: 240 },
    C: { label: 'Deep Drive Left',
         left:  { x: -125, y:  15, r: -18 },
         right: { x:   60, y:  60, r:   0 }, ms: 240 },
    D: { label: 'Unit Turn Left',
         left:  { x:  -90, y:  80, r: -55 },
         right: { x:   50, y:  80, r: -35 }, ms: 220 },
    E: { label: 'Unit Turn Right',
         left:  { x:  -50, y:  80, r:  35 },
         right: { x:   90, y:  80, r:  55 }, ms: 220 },
  };

  // ── 2. State ─────────────────────────────────────────────────────────────────

  let circleSize = 0;

  const state = {
    top:      'setup',  // setup | ready | running | stopped
    phase:    null,     // idleWait | anticipation | preSplit | impact | reaction | reset
    timers:   [],
    wakeLock: null,
  };

  // ── 3. DOM refs ──────────────────────────────────────────────────────────────

  const btnStart      = document.getElementById('btn-start');
  const btnStop       = document.getElementById('btn-stop');
  const btnSettings   = document.getElementById('btn-settings');
  const configPanel   = document.getElementById('config-panel');
  const validationMsg = document.getElementById('validation-msg');
  const statusText    = document.getElementById('status-text');
  const circleEl      = document.getElementById('circle');
  const footLeft      = document.getElementById('foot-left');
  const footRight     = document.getElementById('foot-right');
  const checkboxes    = document.querySelectorAll('input[name="movement"]');
  const inputMinWait  = document.getElementById('input-min-wait');
  const inputMaxWait  = document.getElementById('input-max-wait');
  const inputShrink   = document.getElementById('input-shrink');
  const inputPresplit = document.getElementById('input-presplit');

  // ── 4. Settings persistence ──────────────────────────────────────────────────

  const LS_KEYS = {
    minWait:   'ss_minWait',
    maxWait:   'ss_maxWait',
    shrink:    'ss_shrink',
    presplit:  'ss_presplit',
    movements: 'ss_movements',
  };

  function loadSettings() {
    const get = (k, d) => { const v = localStorage.getItem(k); return v !== null ? v : d; };
    inputMinWait.value  = get(LS_KEYS.minWait,   '5');
    inputMaxWait.value  = get(LS_KEYS.maxWait,  '10');
    inputShrink.value   = get(LS_KEYS.shrink,    '2');
    inputPresplit.value = get(LS_KEYS.presplit, '0.15');
    const saved = get(LS_KEYS.movements, '');
    if (saved) {
      const enabled = new Set(saved.split(','));
      checkboxes.forEach(cb => { cb.checked = enabled.has(cb.value); });
    }
  }

  function saveSettings() {
    localStorage.setItem(LS_KEYS.minWait,   inputMinWait.value);
    localStorage.setItem(LS_KEYS.maxWait,   inputMaxWait.value);
    localStorage.setItem(LS_KEYS.shrink,    inputShrink.value);
    localStorage.setItem(LS_KEYS.presplit,  inputPresplit.value);
    const enabled = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    localStorage.setItem(LS_KEYS.movements, enabled.join(','));
  }

  // ── 5. Settings read + auto-correct ──────────────────────────────────────────

  function readSettings() {
    let minWait  = Math.max(0.5, Math.min(60,  parseFloat(inputMinWait.value)  || 5));
    let maxWait  = Math.max(0.5, Math.min(60,  parseFloat(inputMaxWait.value)  || 10));
    let shrink   = Math.max(0.2, Math.min(10,  parseFloat(inputShrink.value)   || 2));
    let presplit = Math.max(0,                 parseFloat(inputPresplit.value)  || 0.15);
    if (maxWait < minWait) maxWait = minWait;
    presplit = Math.min(presplit, shrink);
    inputMinWait.value  = minWait;
    inputMaxWait.value  = maxWait;
    inputShrink.value   = shrink;
    inputPresplit.value = presplit;
    return { minWait, maxWait, shrink, presplit };
  }

  // ── 6. Helpers ───────────────────────────────────────────────────────────────

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function enabledMovements() {
    return Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
  }

  function pickMovement() {
    const keys = enabledMovements();
    return MOVEMENTS[keys[Math.floor(Math.random() * keys.length)]];
  }

  function schedule(fn, delayS) {
    const id = setTimeout(fn, delayS * 1000);
    state.timers.push(id);
  }

  function clearAllTimers() {
    state.timers.forEach(clearTimeout);
    state.timers = [];
  }

  // ── 7. Rendering helpers ─────────────────────────────────────────────────────

  function footTransform(pos) {
    return `translate(calc(-50% + ${pos.x}px), calc(-50% + ${pos.y}px)) rotate(${pos.r}deg)`;
  }

  function setFoot(el, pos, ms) {
    el.style.transition = ms > 0 ? `transform ${ms}ms ease` : 'none';
    el.style.transform  = footTransform(pos);
  }

  function setNeutral(ms) {
    setFoot(footLeft,  NEUTRAL.left,  ms);
    setFoot(footRight, NEUTRAL.right, ms);
  }

  function setSplit() {
    setFoot(footLeft,  SPLIT.left,  SPLIT_MS);
    setFoot(footRight, SPLIT.right, SPLIT_MS);
  }

  function setReaction(movement) {
    setFoot(footLeft,  movement.left,  movement.ms);
    setFoot(footRight, movement.right, movement.ms);
  }

  function showCircle(shrinkS) {
    circleEl.style.transition = 'none';
    circleEl.style.width      = circleSize + 'px';
    circleEl.style.height     = circleSize + 'px';
    circleEl.style.visibility = 'visible';
    circleEl.getBoundingClientRect(); // force reflow so transition fires
    circleEl.style.transition = `width ${shrinkS}s linear, height ${shrinkS}s linear`;
    circleEl.style.width      = '0px';
    circleEl.style.height     = '0px';
  }

  function hideCircle() {
    circleEl.style.transition = 'none';
    circleEl.style.visibility = 'hidden';
    circleEl.style.width      = circleSize + 'px';
    circleEl.style.height     = circleSize + 'px';
  }

  // ── 8. Wake Lock ─────────────────────────────────────────────────────────────

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { state.wakeLock = await navigator.wakeLock.request('screen'); }
    catch (_) {}
  }

  function releaseWakeLock() {
    if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      releaseWakeLock();
    } else if (state.top === 'running') {
      requestWakeLock();
    }
  });

  // ── 9. Repetition scheduler ──────────────────────────────────────────────────

  function runRep(settings) {
    if (state.top !== 'running') return;

    const waitS    = randBetween(settings.minWait, settings.maxWait);
    const shrinkS  = settings.shrink;
    const presplit = settings.presplit;
    const movement = pickMovement();

    state.phase = 'idleWait';
    statusText.textContent = 'Waiting…';

    schedule(() => {
      if (state.top !== 'running') return;
      state.phase = 'anticipation';
      statusText.textContent = 'Ready…';
      showCircle(shrinkS);
    }, waitS);

    schedule(() => {
      if (state.top !== 'running') return;
      state.phase = 'preSplit';
      setSplit();
    }, waitS + shrinkS - presplit);

    schedule(() => {
      if (state.top !== 'running') return;
      state.phase = 'impact';
      statusText.textContent = 'Go!';
      hideCircle();
    }, waitS + shrinkS);

    schedule(() => {
      if (state.top !== 'running') return;
      state.phase = 'reaction';
      setReaction(movement);
    }, waitS + shrinkS + REACTION_DELAY_S);

    schedule(() => {
      if (state.top !== 'running') return;
      state.phase = 'reset';
      setNeutral(RESET_MS);
      runRep(settings); // begin next rep immediately (idleWait >> RESET_MS)
    }, waitS + shrinkS + RESET_DELAY_S);
  }

  // ── 10. Start / Stop ─────────────────────────────────────────────────────────

  function startDrill() {
    if (state.top === 'running') return;
    const settings = readSettings();
    saveSettings();
    state.top = 'running';
    btnStart.disabled = true;
    setNeutral(0);
    hideCircle();
    requestWakeLock();
    runRep(settings);
  }

  function stopDrill() {
    state.top   = 'stopped';
    state.phase = null;
    clearAllTimers();
    setNeutral(RESET_MS);
    hideCircle();
    releaseWakeLock();
    statusText.textContent = '';
    updateStart();
  }

  // ── 11. UI state ─────────────────────────────────────────────────────────────

  function updateStart() {
    const hasMovements = enabledMovements().length > 0;
    btnStart.disabled = !hasMovements || state.top === 'running';
    validationMsg.textContent = hasMovements ? '' : 'Select at least one movement.';
    if (!hasMovements) statusText.textContent = '';
  }

  // ── 12. Event listeners ──────────────────────────────────────────────────────

  btnStart.addEventListener('click', startDrill);
  btnStop.addEventListener('click',  stopDrill);

  btnSettings.addEventListener('click', () => {
    const open = configPanel.classList.toggle('open');
    btnSettings.setAttribute('aria-expanded', String(open));
  });

  checkboxes.forEach(cb => cb.addEventListener('change', () => {
    updateStart();
    saveSettings();
  }));

  [inputMinWait, inputMaxWait, inputShrink, inputPresplit].forEach(el =>
    el.addEventListener('change', saveSettings)
  );

  // ── 13. Init ─────────────────────────────────────────────────────────────────

  loadSettings();
  setNeutral(0);
  hideCircle();
  updateStart();

  // Keep --circle-d and circleSize = 90% of the stage's smaller dimension
  const stageEl = document.getElementById('stage');
  new ResizeObserver(([entry]) => {
    const { width, height } = entry.contentRect;
    circleSize = Math.min(width, height) * 0.9;
    document.documentElement.style.setProperty('--circle-d', `${circleSize}px`);
  }).observe(stageEl);
</script>

</body>
</html>
